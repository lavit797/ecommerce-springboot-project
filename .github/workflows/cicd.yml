name: CI/CD Pipeline-Springboot
on:
    push:
        branches:
            - main

jobs:
    build:
        name: Build 
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v4
            
            - name: Set up JDK 11
              uses: actions/setup-java@v4
              with:
                    java-version: '11'
                    distribution: 'temurin'
                    cache: maven
            
            - name: build with maven
              run: mvn clean package -DskipTests
              
            - name: upload build artifacts
              uses: actions/upload-artifact@v4
              with:
                name: app-war
                path: target/*.war
    
    test:
        name: Test
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: checkout code 
              uses: actions/checkout@v4
              
            - name: set up jdk 11
              uses: actions/setup-java@v4
              with:
                  java-version: '11'
                  distribution: 'temurin'
                  cache: maven
                  
            - name: run tests
              run: mvn test
              
            - name: upload test results
              if: always()
              uses: actions/upload-artifact@v4
              with:
                name: test-results
                path: target/surefire-reports/*.xml

    sonar-scan:
        name: sonar-scan
        runs-on: ubuntu-latest
        needs: test
        steps:
            - name: checkout code
              uses: actions/checkout@v4
              
            - name: set up jdk 11
              uses: actions/setup-java@v4
              with:
                  java-version: '11'
                  distribution: 'temurin'
                  cache: maven
                  
            - name: sonar scan
              env:
                sonar-token: ${{ secrets.SONAR_TOKEN }}
              run: |
                mvn clean verify sonar:sonar  
                 -Dsonar.projectKey=lavit797_ecommerce-springboot-project \
                 -Dsonar.organization=lavit797 \
                 -Dsonar.host.url=https://44.207.0.157:9000 \
                 -Dsonar.token=$SONAR_TOKEN    


    push:
        name: build and push docker image
        runs-on: ubuntu-latest
        needs: sonar-scan
        steps:
            - name: checkout code
              uses: actions/checkout@v4
              
            - name: download war artifacts
              uses: actions/download-artifact@v4
              with:
                    name: app-war
                    path: .
            
            - name: rename war to app.war
              run: mv *.war app.war

            - name: log in to dockerhub
              uses: docker/login-action@v4
              with: 
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}

            - name: build & push docker image
              uses: docker/build-push-action@v4
              with:
                context: .
                push: true
                tags: |
                     ${{ secrets.DOCKER_USERNAME }}/ecommerce-app:latest
                     ${{ secrets.DOCKER_USERNAME }}/ecommerce-app: ${{ github.run_number}}

     
                  


